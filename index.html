<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Scene - Stellenbosch Models</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: Arial, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #info {
            position: fixed; top: 10px; left: 10px; color: #ffffff;
            background: rgba(0, 0, 0, 0.6); padding: 10px 15px;
            border-radius: 5px; font-size: 14px; z-index: 50;
        }
    </style>
</head>
<body>
<div id="info">
        <strong>Controls:</strong><br>
        Left Click: Pan<br>
        Right Click: Rotate<br>
        Scroll: Zoom
    </div>
    <div id="canvas-container"></div>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
